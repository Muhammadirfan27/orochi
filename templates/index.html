<!DOCTYPE html>
<html>
<body>
    <h1>Orochi AI</h1>
    <div id="chat-box"></div>
    <input type="text" id="msg" placeholder="Apa perintahmu, Komandan?">
    <button onclick="send()">Kirim</button>

    <script>
        async function send() {
            let msg = document.getElementById('msg').value;
            let res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: msg})
            });
            let data = await res.json();
            document.getElementById('chat-box').innerHTML += `<p>Orochi: ${data.reply}</p>`;
        }
    </script>
</body>
</html>
